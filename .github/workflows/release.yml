name: Android Build & Release

# 触发条件
on:
  push:
    branches: ["main", "develop"] # 推送到主分支时触发
    tags:
      - "v*" # 推送 v 开头的 tag 时触发（如 v1.0.0）
  pull_request:
    branches: ["main"] # 对 main 分支的 PR 触发
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest # 使用最新版 Ubuntu 虚拟机
    permissions:
      contents: write # 允许创建 Release 和上传产物

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 JDK 环境
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "gradle" # 自动缓存 Gradle 依赖

      # 3. 缓存 Gradle 依赖（优化构建速度）
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-restore-keys

      # 4. 授予 gradlew 执行权限
      - name: Prepare Gradle Wrapper files (Gradle 8.9)
        run: |
          mkdir -p gradle/wrapper

          # 1. 下载 gradle-wrapper.jar
          wget -q https://github.com/gradle/gradle/raw/v8.9.0/gradle/wrapper/gradle-wrapper.jar \
                -O gradle/wrapper/gradle-wrapper.jar

          # 2. 写入固定版本的 gradle-wrapper.properties
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.9-bin.zip
          networkTimeout=10000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          # 3. 下载 gradlew（Unix）
          wget -q https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradlew -O gradlew
          chmod +x gradlew
        shell: bash

      - uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/terms-of-service"
          build-scan-terms-of-use-agree: "yes"

      # 5. 解码签名密钥（从 GitHub Secrets 读取）
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/release.keystore

      # 6. 运行单元测试
      - name: Run Unit Tests
        run: ./gradlew test

      - name: Verify signing config
        run: ./gradlew :app:signingReport
      # 7. 构建 Release AAB 包（已签名）
      # - name: Build Release AAB
      #   env:
      #     KEYSTORE_FILE: ${{ github.workspace }}/release.keystore
      #     KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      #     KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      #     KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      #   run: ./gradlew bundleRelease

      # 8. 构建 Release APK（可选，同时产物）
      - name: Build Release APK
        env:
          ORG_GRADLE_PROJECT_storeFile: ${{ github.workspace }}/release.keystore
          ORG_GRADLE_PROJECT_storePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_keyAlias: ${{ secrets.KEY_ALIAS }}
          ORG_GRADLE_PROJECT_keyPassword: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      # 9. 上传构建产物（供后续下载）
      # - name: Upload AAB Artifact
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: app-release-aab
      #     path: app/build/outputs/bundle/release/app-release.aab

      - name: List APK outputs
        run: |
          echo "=== APK outputs ==="
          ls -lh app/build/outputs/apk/release/ || echo "release dir missing"
          find app/build -name "*.apk" | sort

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk

  # 10. 发布到 GitHub Release（仅当推送 tag 时执行）
  release:
    if: startsWith(github.ref, 'refs/tags/') # 仅 tag 触发
    needs: build # 等待构建完成
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # - name: Download AAB artifact
      #   uses: actions/download-artifact@v4
      #   with:
      #     name: app-release-aab

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release-apk

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## 自动发布版本

            此 Release 由 GitHub Actions 自动构建生成。

            构建时间：${{ github.event.repository.updated_at }}

          # 包含文件：
          # - AAB 包（适用于 Google Play 发布）
          # - APK 包（适用于直接安装）
          files: |
            app-release.apk
          # app-release.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
